name: Extract Secret Telemetry

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  retrieve-secret:
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to Azure via OIDC
        uses: azure/login@v2
        with:
          client-id: '1b780f08-548b-428d-9d81-df554778fce8'
          tenant-id: '9439dd25-f3b5-4829-a76f-5ede8cd54c3c'
          subscription-id: 'd5ffd8a5-d994-4eb5-b87c-4442054d233e'

      - name: Extract Secret from Key Vault
        uses: azure/get-keyvault-secrets@v1
        with:
          keyvault: 'key-vault-sgt'
          secrets: 'secret-sgt'

      - name: Verify Secret Ingestion Visibility
        run: |
          echo "Data-Plane Target Acquired."
          echo "Secret extraction verification complete."
