name: Extract Secret Telemetry

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  retrieve-secret:
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to Azure via OIDC
        uses: azure/login@v2
        with:
          client-id: '494071c6-3230-4a4a-bc31-9bb7a5389320'
          tenant-id: 'd9e0787e-ef91-4c4f-a9b0-4660d5bfa4d8'
          subscription-id: '685eef6e-9bf2-48a5-bdfc-76e938fcd7e0'

      - name: Extract Secret from Key Vault
        uses: azure/get-keyvault-secrets@v1
        with:
          keyvault: 'key-vault-sgt'
          secrets: 'secret-sgt'

      - name: Verify Secret Ingestion Visibility
        run: |
          echo "Data-Plane Target Acquired."
          echo "Secret extraction verification complete."
